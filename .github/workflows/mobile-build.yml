name: Build S-UI Next Mobile

on:
  workflow_dispatch:
  release:
    types: [published]
  push:
    tags:
      - "*"

permissions:
  contents: write

env:
  FLUTTER_CHANNEL: stable
  MOBILE_PROJECT: sui_mobile
  MOBILE_ORG: io.sui
  BUILD_VERSION: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref_name }}

jobs:
  android-arm64:
    name: Build Android arm64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          submodules: recursive

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Prepare Android project
        run: |
          flutter create --platforms=android --project-name "$MOBILE_PROJECT" --org "$MOBILE_ORG" "$RUNNER_TEMP/sui-mobile"
          rm -rf "$RUNNER_TEMP/sui-mobile/lib" "$RUNNER_TEMP/sui-mobile/test"
          cp -R mobile/. "$RUNNER_TEMP/sui-mobile/"
          mkdir -p "$RUNNER_TEMP/sui-mobile/assets"
          cp frontend/src/assets/logo.png "$RUNNER_TEMP/sui-mobile/assets/logo.png"
          sed -i 's/ios: true/ios: false/' "$RUNNER_TEMP/sui-mobile/pubspec.yaml"
          sed -i 's/<application/<application android:usesCleartextTraffic="true"/' "$RUNNER_TEMP/sui-mobile/android/app/src/main/AndroidManifest.xml"
          sed -i 's/android:label="sui_mobile"/android:label="S-UI Next"/' "$RUNNER_TEMP/sui-mobile/android/app/src/main/AndroidManifest.xml"

      - name: Stamp app version from release tag
        working-directory: ${{ runner.temp }}/sui-mobile
        run: |
          python3 - <<'PY'
          import os
          import pathlib
          import re

          pubspec = pathlib.Path("pubspec.yaml")
          content = pubspec.read_text()
          tag = os.environ["BUILD_VERSION"]
          version = tag[1:] if tag.startswith("v") else tag
          version = version.split("-", 1)[0]
          if not re.fullmatch(r"\d+\.\d+\.\d+", version):
              current = re.search(r"^version:\s*(\d+\.\d+\.\d+)(?:\+\d+)?", content, flags=re.MULTILINE)
              version = current.group(1) if current else "1.0.0"

          build_number = os.environ.get("GITHUB_RUN_NUMBER", "1")
          content = re.sub(r"^version:\s*.*$", f"version: {version}+{build_number}", content, flags=re.MULTILINE)
          pubspec.write_text(content)

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as env:
              env.write(f"APP_VERSION={version}\n")
              env.write(f"APP_BUILD_NUMBER={build_number}\n")
          PY

      - name: Resolve dependencies and icons
        working-directory: ${{ runner.temp }}/sui-mobile
        run: |
          flutter pub get
          dart run flutter_launcher_icons

      - name: Build Android arm64 APK
        working-directory: ${{ runner.temp }}/sui-mobile
        run: flutter build apk --release --target-platform android-arm64 --split-per-abi --build-name "$APP_VERSION" --build-number "$APP_BUILD_NUMBER"

      - name: Name Android package with version
        run: cp "$RUNNER_TEMP/sui-mobile/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk" "$RUNNER_TEMP/s-ui-next-${BUILD_VERSION}-android-arm64.apk"

      - name: Upload Android arm64 artifact
        uses: actions/upload-artifact@v7
        with:
          name: s-ui-next-${{ env.BUILD_VERSION }}-android-arm64
          path: ${{ runner.temp }}/s-ui-next-${{ env.BUILD_VERSION }}-android-arm64.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload Android arm64 to release
        uses: svenstaro/upload-release-action@v2
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref_name }}
          file: ${{ runner.temp }}/s-ui-next-${{ env.BUILD_VERSION }}-android-arm64.apk
          asset_name: s-ui-next-${{ env.BUILD_VERSION }}-android-arm64.apk
          prerelease: false
          overwrite: true

  iphone-arm64:
    name: Build iPhone arm64 (unsigned)
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          submodules: recursive

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Prepare iPhone project
        run: |
          flutter create --platforms=ios --project-name "$MOBILE_PROJECT" --org "$MOBILE_ORG" "$RUNNER_TEMP/sui-mobile"
          rm -rf "$RUNNER_TEMP/sui-mobile/lib" "$RUNNER_TEMP/sui-mobile/test"
          cp -R mobile/. "$RUNNER_TEMP/sui-mobile/"
          mkdir -p "$RUNNER_TEMP/sui-mobile/assets"
          sips -z 1024 1024 frontend/src/assets/logo.png --out "$RUNNER_TEMP/sui-mobile/assets/logo.png"
          sed -i '' 's/android: true/android: false/' "$RUNNER_TEMP/sui-mobile/pubspec.yaml"
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity dict" "$RUNNER_TEMP/sui-mobile/ios/Runner/Info.plist" || true
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSAllowsArbitraryLoads bool true" "$RUNNER_TEMP/sui-mobile/ios/Runner/Info.plist" || true
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName S-UI Next" "$RUNNER_TEMP/sui-mobile/ios/Runner/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleName S-UI Next" "$RUNNER_TEMP/sui-mobile/ios/Runner/Info.plist"
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 13.0;/IPHONEOS_DEPLOYMENT_TARGET = 14.0;/g' "$RUNNER_TEMP/sui-mobile/ios/Runner.xcodeproj/project.pbxproj"
          sed -i '' 's/<string>13.0<\/string>/<string>14.0<\/string>/' "$RUNNER_TEMP/sui-mobile/ios/Flutter/AppFrameworkInfo.plist"

      - name: Stamp app version from release tag
        working-directory: ${{ runner.temp }}/sui-mobile
        run: |
          python3 - <<'PY'
          import os
          import pathlib
          import re

          pubspec = pathlib.Path("pubspec.yaml")
          content = pubspec.read_text()
          tag = os.environ["BUILD_VERSION"]
          version = tag[1:] if tag.startswith("v") else tag
          version = version.split("-", 1)[0]
          if not re.fullmatch(r"\d+\.\d+\.\d+", version):
              current = re.search(r"^version:\s*(\d+\.\d+\.\d+)(?:\+\d+)?", content, flags=re.MULTILINE)
              version = current.group(1) if current else "1.0.0"

          build_number = os.environ.get("GITHUB_RUN_NUMBER", "1")
          content = re.sub(r"^version:\s*.*$", f"version: {version}+{build_number}", content, flags=re.MULTILINE)
          pubspec.write_text(content)

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as env:
              env.write(f"APP_VERSION={version}\n")
              env.write(f"APP_BUILD_NUMBER={build_number}\n")
          PY

      - name: Resolve dependencies and icons
        working-directory: ${{ runner.temp }}/sui-mobile
        run: |
          flutter pub get
          dart run flutter_launcher_icons

      - name: Build iPhone arm64 without signing
        working-directory: ${{ runner.temp }}/sui-mobile
        run: flutter build ios --release --no-codesign --build-name "$APP_VERSION" --build-number "$APP_BUILD_NUMBER"

      - name: Package unsigned IPA
        working-directory: ${{ runner.temp }}/sui-mobile
        run: |
          mkdir -p build/ios/ipa/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -qry "s-ui-next-${BUILD_VERSION}-iphone-arm64-unsigned.ipa" Payload

      - name: Upload iPhone arm64 artifact
        uses: actions/upload-artifact@v7
        with:
          name: s-ui-next-${{ env.BUILD_VERSION }}-iphone-arm64-unsigned
          path: ${{ runner.temp }}/sui-mobile/build/ios/ipa/s-ui-next-${{ env.BUILD_VERSION }}-iphone-arm64-unsigned.ipa
          if-no-files-found: error
          retention-days: 30

      - name: Upload iPhone arm64 to release
        uses: svenstaro/upload-release-action@v2
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref_name }}
          file: ${{ runner.temp }}/sui-mobile/build/ios/ipa/s-ui-next-${{ env.BUILD_VERSION }}-iphone-arm64-unsigned.ipa
          asset_name: s-ui-next-${{ env.BUILD_VERSION }}-iphone-arm64-unsigned.ipa
          prerelease: false
          overwrite: true
