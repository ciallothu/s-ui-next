name: S-UI Next Mobile CI

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/mobile-ci.yml"
      - ".github/workflows/mobile-build.yml"
      - "frontend"
      - "frontend/**"
      - "mobile/**"
      - "api/**"
      - "core/**"
      - "database/**"
      - "service/**"
      - "sub/**"
      - "util/**"
      - "logger/**"
      - "web/**"
      - "go.mod"
      - "go.sum"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/mobile-ci.yml"
      - ".github/workflows/mobile-build.yml"
      - "frontend"
      - "frontend/**"
      - "mobile/**"
      - "api/**"
      - "core/**"
      - "database/**"
      - "service/**"
      - "sub/**"
      - "util/**"
      - "logger/**"
      - "web/**"
      - "go.mod"
      - "go.sum"

permissions:
  contents: read

concurrency:
  group: mobile-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_CHANNEL: stable
  MOBILE_PROJECT: sui_mobile
  MOBILE_ORG: io.sui

jobs:
  app-icon:
    name: Render mobile app icon
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          submodules: recursive

      - name: Render 1024px icon from vector source
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends librsvg2-bin
          sed -E 's/viewBox="[^"]+"/viewBox="0 0 48 48"/' frontend/src/assets/logo.svg > "$RUNNER_TEMP/mobile-icon.svg"
          rsvg-convert --width 1024 --height 1024 --output "$RUNNER_TEMP/logo.png" "$RUNNER_TEMP/mobile-icon.svg"
          python3 - <<'PY'
          import os
          import struct

          path = os.path.join(os.environ["RUNNER_TEMP"], "logo.png")
          with open(path, "rb") as icon:
              header = icon.read(24)
          if header[:8] != b"\x89PNG\r\n\x1a\n":
              raise SystemExit("rendered app icon is not a PNG")
          width, height = struct.unpack(">II", header[16:24])
          if (width, height) != (1024, 1024):
              raise SystemExit(f"unexpected app icon size: {width}x{height}")
          PY

      - name: Upload rendered app icon
        uses: actions/upload-artifact@v7
        with:
          name: mobile-app-icon-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/logo.png
          if-no-files-found: error
          retention-days: 1

  backend-api:
    name: Validate backend and security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify Go module metadata
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Format check
        run: |
          files=$(git ls-files '*.go' | xargs gofmt -l)
          if [ -n "$files" ]; then
            echo "The following files need gofmt:"
            echo "$files"
            exit 1
          fi

      - name: Test all Go packages
        run: go test ./...

      - name: Vet all Go packages
        run: go vet ./...

      - name: Race-check core packages
        run: go test -race ./api ./database ./middleware ./service ./sub ./util ./web

      - name: Scan Go dependencies and call paths
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...

  frontend:
    name: Validate web frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install locked dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Audit dependencies
        working-directory: frontend
        run: npm audit --audit-level=high

  android-arm64:
    name: Check Android arm64
    runs-on: ubuntu-latest
    needs: app-icon
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          submodules: recursive

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Download rendered app icon
        uses: actions/download-artifact@v8
        with:
          name: mobile-app-icon-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/mobile-icon

      - name: Prepare Android project
        run: |
          flutter create --platforms=android --project-name "$MOBILE_PROJECT" --org "$MOBILE_ORG" "$RUNNER_TEMP/sui-mobile"
          rm -rf "$RUNNER_TEMP/sui-mobile/lib" "$RUNNER_TEMP/sui-mobile/test"
          cp -R mobile/. "$RUNNER_TEMP/sui-mobile/"
          mkdir -p "$RUNNER_TEMP/sui-mobile/assets"
          cp "$RUNNER_TEMP/mobile-icon/logo.png" "$RUNNER_TEMP/sui-mobile/assets/logo.png"
          sed -i 's/ios: true/ios: false/' "$RUNNER_TEMP/sui-mobile/pubspec.yaml"
          sed -i 's/<application/<application android:usesCleartextTraffic="true"/' "$RUNNER_TEMP/sui-mobile/android/app/src/main/AndroidManifest.xml"
          sed -i 's/android:label="sui_mobile"/android:label="S-UI Next"/' "$RUNNER_TEMP/sui-mobile/android/app/src/main/AndroidManifest.xml"

      - name: Resolve dependencies and icons
        working-directory: ${{ runner.temp }}/sui-mobile
        run: |
          flutter pub get
          dart run flutter_launcher_icons

      - name: Analyze and test
        working-directory: ${{ runner.temp }}/sui-mobile
        run: |
          flutter analyze
          flutter test

      - name: Build Android arm64
        working-directory: ${{ runner.temp }}/sui-mobile
        run: flutter build apk --release --target-platform android-arm64 --split-per-abi

  iphone-arm64:
    name: Check iPhone arm64
    runs-on: macos-latest
    needs: app-icon
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          submodules: recursive

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Download rendered app icon
        uses: actions/download-artifact@v8
        with:
          name: mobile-app-icon-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/mobile-icon

      - name: Prepare iPhone project
        run: |
          flutter create --platforms=ios --project-name "$MOBILE_PROJECT" --org "$MOBILE_ORG" "$RUNNER_TEMP/sui-mobile"
          rm -rf "$RUNNER_TEMP/sui-mobile/lib" "$RUNNER_TEMP/sui-mobile/test"
          cp -R mobile/. "$RUNNER_TEMP/sui-mobile/"
          mkdir -p "$RUNNER_TEMP/sui-mobile/assets"
          cp "$RUNNER_TEMP/mobile-icon/logo.png" "$RUNNER_TEMP/sui-mobile/assets/logo.png"
          sed -i '' 's/android: true/android: false/' "$RUNNER_TEMP/sui-mobile/pubspec.yaml"
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity dict" "$RUNNER_TEMP/sui-mobile/ios/Runner/Info.plist" || true
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSAllowsArbitraryLoads bool true" "$RUNNER_TEMP/sui-mobile/ios/Runner/Info.plist" || true
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName S-UI Next" "$RUNNER_TEMP/sui-mobile/ios/Runner/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleName S-UI Next" "$RUNNER_TEMP/sui-mobile/ios/Runner/Info.plist"
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 13.0;/IPHONEOS_DEPLOYMENT_TARGET = 14.0;/g' "$RUNNER_TEMP/sui-mobile/ios/Runner.xcodeproj/project.pbxproj"
          sed -i '' 's/<string>13.0<\/string>/<string>14.0<\/string>/' "$RUNNER_TEMP/sui-mobile/ios/Flutter/AppFrameworkInfo.plist"

      - name: Resolve dependencies and icons
        working-directory: ${{ runner.temp }}/sui-mobile
        run: |
          flutter pub get
          dart run flutter_launcher_icons

      - name: Analyze and test
        working-directory: ${{ runner.temp }}/sui-mobile
        run: |
          flutter analyze
          flutter test

      - name: Build iPhone arm64 without signing
        working-directory: ${{ runner.temp }}/sui-mobile
        run: flutter build ios --release --no-codesign
