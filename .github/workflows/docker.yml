name: Docker Image CI
on:
  push:
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  CRONET_GO_VERSION: "98d539ce67568fb911654e66a14cf4247ed833ec"
  CRONET_GO_REPO: https://github.com/sagernet/cronet-go.git

jobs:
  frontend-build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          submodules: recursive
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 25
      - name: Install dependencies and build frontend
        run: |
          cd frontend
          npm ci
          npm run build
      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist-${{ github.run_id }}-${{ github.run_attempt }}
          path: frontend/dist/

  build:
    needs: frontend-build
    name: build-${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: amd64, platform: linux/amd64, runner: ubuntu-24.04, qemu: false, cross: false, dockerfile: Dockerfile.frontend-artifact }
          - { name: "386", platform: linux/386, runner: ubuntu-24.04, qemu: true, cross: false, dockerfile: Dockerfile.frontend-artifact }
          - { name: arm64, platform: linux/arm64/v8, runner: ubuntu-24.04-arm, qemu: false, cross: false, dockerfile: Dockerfile.frontend-artifact }
          - { name: armv7, platform: linux/arm/v7, runner: ubuntu-24.04, qemu: true, cross: true, arch: arm, goarm: "7", dockerfile: Dockerfile.prebuilt }
          - { name: armv6, platform: linux/arm/v6, runner: ubuntu-24.04, qemu: true, cross: true, arch: arm, goarm: "6", dockerfile: Dockerfile.prebuilt }
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
      - name: Download frontend build artifact
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist-${{ github.run_id }}-${{ github.run_attempt }}
          path: frontend_dist
      - name: Prepare
        run: |
          platform="${{ matrix.platform }}"
          echo "Building $platform on $(uname -m)"
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - name: Set up Go for cross compilation
        if: matrix.cross
        uses: actions/setup-go@v6
        with:
          cache: false
          go-version-file: go.mod

      - name: Prepare embedded frontend
        if: matrix.cross
        run: |
          rm -rf web/html
          mkdir -p web/html
          cp -R frontend_dist/. web/html/

      - name: Clone Cronet cross toolchain
        if: matrix.cross
        run: |
          set -e
          git init ~/cronet-go
          git -C ~/cronet-go remote add origin "${{ env.CRONET_GO_REPO }}"
          git -C ~/cronet-go fetch --depth=1 origin "${{ env.CRONET_GO_VERSION }}"
          git -C ~/cronet-go checkout FETCH_HEAD
          git -C ~/cronet-go submodule update --init --recursive --depth=1

      - name: Regenerate Cronet sysroot keyring
        if: matrix.cross
        run: |
          set -e
          rm -f ~/cronet-go/naiveproxy/src/build/linux/sysroot_scripts/keyring.gpg
          cd ~/cronet-go
          GPG_TTY=/dev/null ./naiveproxy/src/build/linux/sysroot_scripts/generate_keyring.sh

      - name: Restore Cronet cross toolchain
        if: matrix.cross
        uses: actions/cache@v5
        with:
          path: |
            ~/cronet-go/naiveproxy/src/third_party/llvm-build/
            ~/cronet-go/naiveproxy/src/gn/out/
            ~/cronet-go/naiveproxy/src/chrome/build/pgo_profiles/
            ~/cronet-go/naiveproxy/src/out/sysroot-build/
          key: chromium-toolchain-${{ matrix.name }}-musl-${{ env.CRONET_GO_VERSION }}

      - name: Configure Cronet cross toolchain
        if: matrix.cross
        run: |
          set -e
          cd ~/cronet-go
          go run ./cmd/build-naive --target=linux/${{ matrix.arch }} --libc=musl download-toolchain
          go run ./cmd/build-naive --target=linux/${{ matrix.arch }} --libc=musl env | while IFS= read -r line; do
            line="${line#export }"
            [[ -z "$line" ]] && continue
            echo "$line" >> "$GITHUB_ENV"
          done
          echo "CGO_ENABLED=1" >> "$GITHUB_ENV"
          echo "GOOS=linux" >> "$GITHUB_ENV"
          echo "GOARCH=${{ matrix.arch }}" >> "$GITHUB_ENV"
          echo "GOARM=${{ matrix.goarm }}" >> "$GITHUB_ENV"

      - name: Cross-compile static backend
        if: matrix.cross
        run: |
          set -e
          BUILD_TAGS="with_quic,with_grpc,with_utls,with_acme,with_gvisor,badlinkname,tfogo_checklinkname0,with_tailscale,with_naive_outbound,with_musl"
          go build -ldflags="-w -s -checklinkname=0 -linkmode external -extldflags '-static'" -tags "$BUILD_TAGS" -o sui main.go
          file sui
          ldd sui 2>/dev/null && exit 1 || echo "Static binary confirmed"
          mkdir -p docker_artifacts
          mv sui docker_artifacts/s-ui-next-bin

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=pep440,pattern={{version}}
      - name: Set up QEMU
        if: matrix.qemu
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Cache Docker layers
        uses: actions/cache@v5
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ matrix.platform }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-${{ matrix.platform }}-
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ env.IMAGE_NAME }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache,mode=max
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true
      - name: Export digest
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          echo "${digest#sha256:}" > "${{ runner.temp }}/digests/${digest#sha256:}"
      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ github.run_id }}-${{ github.run_attempt }}-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-${{ github.run_id }}-${{ github.run_attempt }}-*
          merge-multiple: true
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=pep440,pattern={{version}}
      - name: Create manifest list and push
        env:
          DOCKER_METADATA_OUTPUT_JSON: ${{ steps.meta.outputs.json }}
        working-directory: ${{ runner.temp }}/digests
        run: |
          set -e
          TAGS_ARGS=$(echo "$DOCKER_METADATA_OUTPUT_JSON" | jq -cr '.tags | map("-t " + .) | join(" ")')
          DIGEST_REFS=$(for f in *; do echo -n "${IMAGE_NAME}@sha256:$(cat "$f") "; done)
          docker buildx imagetools create $TAGS_ARGS $DIGEST_REFS
