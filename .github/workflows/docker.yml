name: Docker Image CI
on:
  push:
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  frontend-build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          submodules: recursive
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 25
      - name: Install dependencies and build frontend
        run: |
          cd frontend
          npm ci
          npm run build
      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist-${{ github.run_id }}-${{ github.run_attempt }}
          path: frontend/dist/

  build:
    needs: frontend-build
    strategy:
      fail-fast: false
      matrix:
        include:
          - { platform: linux/amd64, runner: ubuntu-24.04, qemu: false }
          - { platform: linux/386, runner: ubuntu-24.04, qemu: true }
          - { platform: linux/arm64/v8, runner: ubuntu-24.04-arm, qemu: false }
          - { platform: linux/arm/v7, runner: ubuntu-24.04, qemu: true }
          - { platform: linux/arm/v6, runner: ubuntu-24.04, qemu: true }
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
      - name: Download frontend build artifact
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist-${{ github.run_id }}-${{ github.run_attempt }}
          path: frontend_dist
      - name: Prepare
        run: |
          platform="${{ matrix.platform }}"
          echo "Building $platform on $(uname -m)"
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=pep440,pattern={{version}}
      - name: Set up QEMU
        if: matrix.qemu
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Cache Docker layers
        uses: actions/cache@v5
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ matrix.platform }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-${{ matrix.platform }}-
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.frontend-artifact
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ env.IMAGE_NAME }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache,mode=max
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true
      - name: Export digest
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          echo "${digest#sha256:}" > "${{ runner.temp }}/digests/${digest#sha256:}"
      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ github.run_id }}-${{ github.run_attempt }}-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-${{ github.run_id }}-${{ github.run_attempt }}-*
          merge-multiple: true
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=pep440,pattern={{version}}
      - name: Create manifest list and push
        env:
          DOCKER_METADATA_OUTPUT_JSON: ${{ steps.meta.outputs.json }}
        working-directory: ${{ runner.temp }}/digests
        run: |
          set -e
          TAGS_ARGS=$(echo "$DOCKER_METADATA_OUTPUT_JSON" | jq -cr '.tags | map("-t " + .) | join(" ")')
          DIGEST_REFS=$(for f in *; do echo -n "${IMAGE_NAME}@sha256:$(cat "$f") "; done)
          docker buildx imagetools create $TAGS_ARGS $DIGEST_REFS
